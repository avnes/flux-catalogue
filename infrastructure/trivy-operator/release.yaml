apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: trivy-system
spec:
  chart:
    spec:
      chart: trivy-operator
      sourceRef:
        kind: HelmRepository
        name: trivy-operator
        namespace: trivy-system
  interval: 1m0s
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    service:
      headless: false
    serviceMonitor:
      enabled: true
      namespace: trivy-system
    trivy:
      ignoreUnfixed: true
      labels:
        scrape-service-metrics: "true"
    operator:
      labels:
        scrape-service-metrics: "true"
